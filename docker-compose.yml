services:
  db:
    image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    volumes:
      - db_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z@sha256:064117214caceaa8d8a90ef7caa58f2b2aeb316b5156afe9ee8da5b4d83e12c8
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc ilm rule add myminio/${MINIO_DEFAULT_BUCKET} --prefix 'temporary/' --expire-days 1 || true &&
        echo 'MinIO ILM rule configured for temporary/ prefix'
      "

  stt-service:
    build:
      context: ./stt-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      HF_HOME: /app/models
      HF_TOKEN: ${HF_TOKEN}
      # STT_THREADS: 4  # Number of CPU threads for transcription (default: auto)
    volumes:
      - stt_models:/app/models
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  redis:
    image: redis:8-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-key.json
      GOOGLE_GENAI_USE_VERTEXAI: "True"
      NODE_OPTIONS: "--dns-result-order=ipv6first"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      stt-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./secrets/gcp-key.json:/run/secrets/gcp-key.json:ro
    networks:
      - app-network
    read_only: true
    cap_drop:
      - ALL
    user: "65532:65532"
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /app/.next/cache:size=50M,mode=1777

networks:
  app-network:
    enable_ipv6: false
    ipam:
      config:
        - subnet: 172.31.250.0/24
        # - subnet: fd00:cafe:face:b00c::/64

volumes:
  db_data:
  minio_data:
  stt_models:
