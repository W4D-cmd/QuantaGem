services:
  db:
    image: postgres:18-alpine@sha256:b40d931bd0e7ce6eecc59a5a6ac3b3c04a01e559750e73e7086b6dbd7f8bf545
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z@sha256:064117214caceaa8d8a90ef7caa58f2b2aeb316b5156afe9ee8da5b4d83e12c8
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  stt-service:
    build:
      context: ./stt-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      WHISPER_MODEL_DIR: /app/models
    volumes:
      - stt_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  redis:
    image: redis:8-alpine@sha256:6cbef353e480a8a6e7f10ec545f13d7d3fa85a212cdcc5ffaf5a1c818b9d3798
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-key.json
      GOOGLE_GENAI_USE_VERTEXAI: "True"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      stt-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./secrets/gcp-key.json:/run/secrets/gcp-key.json:ro
    read_only: true
    cap_drop:
      - ALL
    user: "65532:65532"
    tmpfs:
      - /tmp:size=50M,mode=1777
      - /app/.next/cache:size=50M,mode=1777

volumes:
  db_data:
  minio_data:
  stt_models:
